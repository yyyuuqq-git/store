<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관광지 상세 정보 - BUSAN GO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 상단 네비게이션 헤더 -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon"></span>
                BUSAN GO
            </a>
            
            <nav>
                <a href="index.html" class="nav-link active">홈으로 돌아가기</a>
            </nav>
        </div>
    </header>

    <!-- 메인 콘텐츠 영역 -->
    <main>
        <!-- 히어로 섹션 (동적 배경색 적용) -->
        <section id="detail-hero-bg" class="hero-section" style="border-radius: var(--radius-lg); margin-top: 2rem; min-height: 280px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 4rem 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; overflow: hidden;">
            <span id="detail-category" class="tour-tag" style="font-size: 0.95rem; color: #fff; background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 20px; margin-bottom: 1.25rem; font-weight: 700; letter-spacing: 1px; backdrop-filter: var(--glass-blur);">카테고리</span>
            <h1 id="detail-name" class="hero-title" style="margin-bottom: 0; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.6); font-size: 2.8rem; font-weight: 800;">관광지 이름</h1>
        </section>

        <!-- 상세 설명 및 정보 카드 -->
        <section class="planner-card" style="margin-top: 3rem; padding: 3rem;">
            <div style="margin-bottom: 3rem;">
                <h2 style="font-size: 1.6rem; margin-bottom: 1.25rem; color: var(--text-main); display: flex; align-items: center; gap: 10px; font-weight: 700;">
                    <span style="font-size: 1.5rem;">🌊</span> 관광명소 소개
                </h2>
                <p id="detail-description" style="color: var(--text-muted); font-size: 1.05rem; line-height: 1.8; white-space: pre-wrap; letter-spacing: -0.2px;">상세 설명이 들어갑니다.</p>
            </div>

            <!-- 현지 가이드 꿀팁 -->
            <div style="margin-bottom: 3rem; padding: 1.75rem; background: rgba(255, 95, 0, 0.05); border: 1px solid rgba(255, 95, 0, 0.15); border-radius: var(--radius-md); box-shadow: 0 4px 15px rgba(255, 95, 0, 0.05);">
                <h3 style="font-size: 1.25rem; margin-bottom: 0.85rem; color: var(--accent); display: flex; align-items: center; gap: 8px; font-weight: 700;">
                    💡 현지 가이드 꿀팁 (Tip)
                </h3>
                <p id="detail-tip" style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; font-weight: 500;">꿀팁 내용이 들어갑니다.</p>
            </div>

            <!-- 세부 여행 정보 -->
            <div class="planner-form" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 3.5rem;">
                <div style="padding: 1.5rem; background: rgba(255, 255, 255, 0.02); border-radius: var(--radius-md); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 0.5rem;">
                    <strong style="color: var(--primary-hover); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;">🕒 추천 방문 시간</strong>
                    <span id="detail-time" style="font-size: 0.95rem; color: var(--text-main); font-weight: 500; line-height: 1.5;">시간 정보</span>
                </div>
                <div style="padding: 1.5rem; background: rgba(255, 255, 255, 0.02); border-radius: var(--radius-md); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 0.5rem;">
                    <strong style="color: var(--primary-hover); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;">💵 이용 요금</strong>
                    <span id="detail-fee" style="font-size: 0.95rem; color: var(--text-main); font-weight: 500; line-height: 1.5;">요금 정보</span>
                </div>
                <div style="padding: 1.5rem; background: rgba(255, 255, 255, 0.02); border-radius: var(--radius-md); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 0.5rem;">
                    <strong style="color: var(--primary-hover); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;">🚇 찾아가는 방법</strong>
                    <span id="detail-transport" style="font-size: 0.95rem; color: var(--text-main); font-weight: 500; line-height: 1.5;">교통 정보</span>
                </div>
            </div>

            <!-- 작업 및 안내 링크 -->
            <div style="text-align: center; display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap;">
                <a id="detail-map-link" href="#" target="_blank" class="btn" data-variant="primary" data-size="lg" style="min-width: 240px; text-decoration: none;">
                    🗺️ 카카오맵 길찾기
                </a>
                <a href="index.html" class="btn" data-variant="secondary" data-size="lg" style="min-width: 160px; text-decoration: none;">
                    홈으로 돌아가기
                </a>
            </div>
        </section>
    </main>

    <script src="spot-detail.js"></script>
</body>
</html>
